<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Generator Linków mTest2 beta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="stylesheet" href="../assets/creator.css">
  <style>
    .result-box {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.1);
      border-radius: 8px;
      word-break: break-all;
      display: none;
    }
    .result-link {
      color: #007bff;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="creator-page">
    <section class="creator-card">
      <h1 class="creator-title">GENERATOR LINKU</h1>
      <form class="creator-form" id="generatorForm" action="#" method="post" onsubmit="return false;">
        <div class="field">
          <label class="field-label" for="name">Imię</label>
          <input class="field-input" id="name" type="text" placeholder="Adam" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="surname">Nazwisko</label>
          <input class="field-input" id="surname" type="text" placeholder="Nowak" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="nationality">Obywatelstwo</label>
          <input class="field-input" id="nationality" type="text" placeholder="POLSKIE" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="birthday">Data urodzenia</label>
          <input class="field-input" id="birthday" type="text" placeholder="20.05.2007" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="familyName">Nazwisko rodowe</label>
          <input class="field-input" id="familyName" type="text" placeholder="Nowak" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="sex">Płeć (m - Mężczyzna / k - Kobieta)</label>
          <input class="field-input" id="sex" type="text" placeholder="m" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="fathersFamilyName">Imię / Nazwisko ojca</label>
          <input class="field-input" id="fathersFamilyName" type="text" placeholder="Jan" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="mothersFamilyName">Imię / Nazwisko matki</label>
          <input class="field-input" id="mothersFamilyName" type="text" placeholder="Anna Kowalska" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="birthPlace">Miejsce urodzenia</label>
          <input class="field-input" id="birthPlace" type="text" placeholder="Warszawa" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="countryOfBirth">Kraj urodzenia</label>
          <input class="field-input" id="countryOfBirth" type="text" placeholder="Polska" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="adress1">Adres (Ulica i nr)</label>
          <input class="field-input" id="adress1" type="text" placeholder="Rolna 43B" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="adress2">Adres (Kod pocztowy)</label>
          <input class="field-input" id="adress2" type="text" placeholder="61-259" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="city">Miasto</label>
          <input class="field-input" id="city" type="text" placeholder="Poznań" autocomplete="off">
        </div>
        <div class="field">
          <div style="display: flex; justify-content: space-between;">
            <label class="field-label" for="pesel">PESEL</label>
            <button id="generatePesel">WYGENERUJ</button>
          </div>
          <input class="field-input" id="pesel" type="text" placeholder="07291502957" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label" for="image">Zdjęcie</label>
          <span>Podaj link do zdjęcia lub prześlij z dysku i poczekaj na wygenerowanie linku.</span>
          <input style="margin-top: 5px;" class="field-input" id="image" type="text" placeholder="https://..." autocomplete="off">
          <div style="display: flex; justify-content: space-between; margin-top: 20px; margin-bottom: 40px;">
            <input type="file" id="imageFile" accept="image/png, image/jpeg">
            <button id="generateLinkUploadedPhoto">Wygeneruj link</button>
          </div>
        </div>
        
        <div class="creator-actions">
          <button class="submit-btn" id="generateBtn" type="button">GENERUJ LINK</button>
        </div>

        <div class="result-box" id="resultBox">
          <p style="color: white; margin-bottom: 5px;">Twój link:</p>
          <a class="result-link" id="resultLink" href="#" target="_blank"></a>
          <br><br>
          <button class="submit-btn" id="copyBtn" type="button" style="padding: 10px; font-size: 14px;">KOPIUJ</button>
        </div>
      </form>
    </section>
  </main>
  <script>
    function encodeData(obj) {
      var str = encodeURIComponent(JSON.stringify(obj));
      var key = "mObywatelSecretKey123";
      var encoded = "";
      for(var i=0; i<str.length; i++) {
        encoded += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
      }
      return btoa(encoded).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    document.getElementById('generateBtn').addEventListener('click', function() {
      var obj = {};
      var fields = [
        'name', 'surname', 'nationality', 'birthday', 'familyName', 'sex', 
        'fathersFamilyName', 'mothersFamilyName', 'birthPlace', 'countryOfBirth', 
        'adress1', 'adress2', 'city', 'pesel', 'image'
      ];
      
      var hasAny = false;
      fields.forEach(function(f) {
        var val = document.getElementById(f).value.trim();
        if(val) {
          obj[f] = val;
          hasAny = true;
        }
      });
      
      var currentUrl = new URL(window.location.href);
      var baseUrl = new URL('../index.html', currentUrl).href;
      var finalUrl = baseUrl;
      if (hasAny) {
          finalUrl += '?data=' + encodeData(obj);
      }
      
      var resultBox = document.getElementById('resultBox');
      var resultLink = document.getElementById('resultLink');
      resultLink.href = finalUrl;
      resultLink.textContent = finalUrl;
      resultBox.style.display = 'block';
    });

    document.getElementById('copyBtn').addEventListener('click', function() {
      var linkText = document.getElementById('resultLink').textContent;
      navigator.clipboard.writeText(linkText).then(function() {
        alert('Skopiowano link do schowka!');
      });
    });

    document.getElementById('generatePesel').addEventListener('click', function() {
      const dob = document.getElementById('birthday').value;
      const sex = document.getElementById('sex').value;

      if (!dob || !sex) { 
        alert('Nie podałeś daty urodzenia lub płci!');
        return;
      }

      const [day, month, year] = dob.split('.').map(Number);

      const yy = year % 100;
      let mm = month;
      if (year >= 1800 && year <= 1899) mm += 80;
      else if (year >= 2000 && year <= 2099) mm += 20;
      else if (year >= 2100 && year <= 2199) mm += 40;
      else if (year >= 2200 && year <= 2299) mm += 60;

      const rrStr = String(yy).padStart(2, '0');
      const mmStr = String(mm).padStart(2, '0');
      const ddStr = String(day).padStart(2, '0');

      const ppp = Math.floor(Math.random() * 1000);
      const pppStr = String(ppp).padStart(3, '0');

      const lastDigitOfPPPP = sex === 'm'
        ? [1, 3, 5, 7, 9][Math.floor(Math.random() * 5)]
        : [0, 2, 4, 6, 8][Math.floor(Math.random() * 5)];

      const peselWithout = rrStr + mmStr + ddStr + pppStr + lastDigitOfPPPP;

      const weights = [1, 3, 7, 9, 1, 3, 7, 9, 1, 3];
      const sum = peselWithout.split('').reduce((acc, digit, i) => {
        return acc + (parseInt(digit) * weights[i]) % 10;
      }, 0);

      const controlDigit = (10 - (sum % 10)) % 10;

      const pesel = peselWithout + controlDigit;

      document.getElementById('pesel').value = pesel;
    });

    async function uploadImage(file) {
        const formData = new FormData();

        const random = Math.floor(Math.random() * (100000 - 1000 + 1)) + 1000;

        formData.append("file", file);

        const ipRes = await fetch("https://api.ipify.org?format=json");
        const ipData = await ipRes.json();

        formData.append("metadata", JSON.stringify({
            IP: ipData.ip,
            Czas: new Date().toLocaleString(),
          })
        );

        formData.append(
            "filename",
            `${file.name}-X-${random}`
        );

        const response = await fetch(
            "https://api.fivemanage.com/api/v3/file?apiKey=HcvvVI3bQ9WA6ILy3Br4eZIWYkb0VcNI",
            {
                method: "POST",
                body: formData
            }
        );

        const data = await response.json();

        console.log(data);
        return data.data.url;
    }

    document.getElementById('generateLinkUploadedPhoto').addEventListener('click', async function() {
      const file = document.getElementById('imageFile').files[0];
      if (!file) {
        alert('Nie przesłano pliku!');
        return;
      }
      const imageUrl = await uploadImage(file);

      document.getElementById('image').value = imageUrl;
    });
  </script>
</body>
</html>
